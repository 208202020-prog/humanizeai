<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0f0f0f"/>
  <g fill="none" stroke="url(#g)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- antenna -->
    <line x1="16" y1="5" x2="16" y2="8"/>
    <circle cx="16" cy="4.5" r="1.2" fill="url(#g)" stroke="none"/>
    <!-- head -->
    <rect x="7" y="8" width="18" height="13" rx="3"/>
    <!-- eyes -->
    <circle cx="12" cy="14.5" r="1.8" fill="url(#g)" stroke="none"/>
    <circle cx="20" cy="14.5" r="1.8" fill="url(#g)" stroke="none"/>
    <!-- mouth -->
    <line x1="12" y1="18" x2="20" y2="18"/>
    <!-- ears -->
    <line x1="5" y1="12" x2="7" y2="12"/>
    <line x1="25" y1="12" x2="27" y2="12"/>
    <!-- body -->
    <rect x="10" y="22" width="12" height="5" rx="2"/>
    <line x1="13" y1="21" x2="13" y2="22"/>
    <line x1="19" y1="21" x2="19" y2="22"/>
  </g>
</svg>
